<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiverr Star — Project Delivery Timeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg-0: #07070d;
    --bg-1: #0e0e17;
    --bg-2: #151520;
    --bg-3: #1d1d2a;
    --bg-4: #262636;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --text-muted: #9090a8;
    --text-dim: #5a5a70;

    --w1: #4f8cff;
    --w2: #a855f7;
    --w3: #22c55e;
    --w4: #f59e0b;
    --w5: #ef4444;
    --milestone: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-0);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* Hero */
  .hero {
    padding: 56px 48px 16px;
    text-align: center;
    position: relative;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 100% at 50% 0%, rgba(79,140,255,0.08), transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -1.2px;
    background: linear-gradient(135deg, var(--w1), var(--w2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }
  .hero p {
    color: var(--text-muted);
    font-size: 15px;
    position: relative;
    z-index: 1;
  }

  /* Meta badges */
  .meta-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 20px 48px 32px;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .meta-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .meta-item strong {
    color: var(--text);
    font-weight: 600;
  }

  /* Controls */
  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 0 48px 16px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn:hover {
    background: var(--bg-3);
    color: var(--text);
    border-color: var(--border-hover);
  }
  .btn.active {
    background: var(--w1);
    color: #fff;
    border-color: var(--w1);
  }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 0 48px 32px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .legend-bar {
    width: 18px;
    height: 6px;
    border-radius: 3px;
  }
  .legend-diamond {
    width: 8px;
    height: 8px;
    background: var(--milestone);
    transform: rotate(45deg);
    border-radius: 1px;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 0 48px 32px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .stat-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    transition: all 0.2s;
  }
  .stat-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-1px);
  }
  .stat-val {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--w1), var(--w2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Gantt wrapper */
  .gantt-outer {
    padding: 0 0 80px;
    position: relative;
  }
  .gantt-scroll {
    overflow-x: auto;
    overflow-y: hidden;
  }
  .gantt-scroll::-webkit-scrollbar { height: 8px; }
  .gantt-scroll::-webkit-scrollbar-track { background: var(--bg-1); border-radius: 4px; }
  .gantt-scroll::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 4px; }
  .gantt-scroll::-webkit-scrollbar-thumb:hover { background: #3a3a50; }

  /* The grid */
  .gantt-grid {
    display: grid;
    grid-template-columns: 260px repeat(32, 72px);
    min-width: 2564px; /* 260 + 32*72 */
    position: relative;
  }

  /* Week band rows */
  .week-band {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: subgrid;
    align-items: center;
  }
  .week-band .band-label {
    grid-column: 1 / -1;
    padding: 14px 20px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .week-band .band-label span:nth-child(2) {
    color: var(--text-muted);
    font-weight: 500;
    text-transform: none;
    letter-spacing: normal;
    font-size: 12px;
  }

  /* Day headers row */
  .day-header {
    display: grid;
    grid-template-columns: subgrid;
    grid-column: 1 / -1;
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--bg-0);
  }
  .day-header .day-cell {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    border-right: 1px solid var(--border);
    border-bottom: 2px solid var(--border);
  }
  .day-header .day-cell.sticky-label {
    background: var(--bg-0);
    border-right: 2px solid var(--border);
    position: sticky;
    left: 0;
    z-index: 31;
  }
  .day-header .day-cell.week-start {
    color: var(--text-muted);
    font-weight: 700;
  }

  /* Task rows */
  .task-row {
    display: grid;
    grid-template-columns: subgrid;
    grid-column: 1 / -1;
    min-height: 52px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    transition: background 0.15s;
  }
  .task-row:hover {
    background: rgba(79,140,255,0.03);
  }
  .task-row.milestone-row {
    background: rgba(251,191,36,0.03);
  }
  .task-row.milestone-row:hover {
    background: rgba(251,191,36,0.06);
  }

  /* Sticky task label column */
  .task-label {
    position: sticky;
    left: 0;
    z-index: 20;
    background: var(--bg-0);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-right: 2px solid var(--border);
    height: 100%;
  }
  .task-row:hover .task-label {
    background: var(--bg-1);
  }

  .task-num {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .task-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-row:hover .task-name {
    color: #fff;
  }

  .milestone-label {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .milestone-diamond {
    width: 12px;
    height: 12px;
    background: var(--milestone);
    transform: rotate(45deg);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .milestone-label .task-name {
    color: var(--milestone);
    font-weight: 700;
  }

  /* Bar cells */
  .bar-cell {
    height: 100%;
    position: relative;
    border-right: 1px solid var(--border);
  }

  /* Bars */
  .bar {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.95);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    z-index: 5;
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .bar:hover {
    filter: brightness(1.15);
    transform: translateY(-50%) scale(1.02);
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .bar:hover .bar-text {
    opacity: 1;
  }
  .bar .bar-text {
    opacity: 0.7;
    transition: opacity 0.15s;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Milestone marker on the timeline */
  .milestone-marker {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 16px;
    height: 16px;
    background: var(--milestone);
    border: 2px solid var(--bg-0);
    transform: translate(-50%, -50%) rotate(45deg);
    border-radius: 3px;
    z-index: 6;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 12px rgba(251,191,36,0.3);
  }
  .milestone-marker:hover {
    transform: translate(-50%, -50%) rotate(45deg) scale(1.3);
    box-shadow: 0 0 20px rgba(251,191,36,0.5);
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    z-index: 1000;
    background: var(--bg-2);
    border: 1px solid var(--border-hover);
    border-radius: 14px;
    padding: 18px 20px;
    width: 380px;
    font-size: 12px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #tooltip.show {
    opacity: 1;
  }
  #tooltip h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #fff;
  }
  #tooltip .tt-phase {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 10px;
  }
  #tooltip .tt-day {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 10px;
    font-weight: 500;
  }
  #tooltip ul {
    padding-left: 16px;
    color: var(--text-muted);
    font-size: 12px;
    max-height: 220px;
    overflow-y: auto;
  }
  #tooltip ul li {
    margin-bottom: 4px;
    line-height: 1.5;
  }
  #tooltip .tt-deps {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
  }

  /* Progress footer */
  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: rgba(14,14,23,0.92);
    backdrop-filter: blur(20px) saturate(1.2);
    border-top: 1px solid var(--border);
    padding: 14px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .footer-bar .fb-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
  }
  .footer-bar .fb-progress {
    flex: 1;
    max-width: 480px;
    height: 5px;
    background: var(--bg-3);
    border-radius: 3px;
    overflow: hidden;
  }
  .footer-bar .fb-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--w1), var(--w2), var(--w3));
    width: 0%;
    transition: width 0.6s ease;
  }
  .footer-bar .fb-pct {
    font-size: 14px;
    font-weight: 700;
    color: var(--w1);
    white-space: nowrap;
  }

  /* Dependency SVG */
  .dep-svg {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 2;
  }

  @media (max-width: 768px) {
    .hero { padding: 32px 20px 12px; }
    .hero h1 { font-size: 28px; }
    .meta-row, .controls, .legend, .stats-grid { padding-left: 20px; padding-right: 20px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .task-label { padding: 8px 10px; min-width: 160px; }
    .gantt-grid { grid-template-columns: 160px repeat(32, 56px); min-width: 1932px; }
    .footer-bar { padding: 10px 20px; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>Fiverr Star</h1>
  <p>Project Delivery Timeline — 32 Days to Launch</p>
</div>

<div class="meta-row">
  <div class="meta-item"><div class="meta-dot" style="background:var(--w1)"></div><strong>Week 1</strong> Foundation & Marketing</div>
  <div class="meta-item"><div class="meta-dot" style="background:var(--w2)"></div><strong>Week 2</strong> Shop & Cart</div>
  <div class="meta-item"><div class="meta-dot" style="background:var(--w3)"></div><strong>Week 3</strong> Checkout & Seller</div>
  <div class="meta-item"><div class="meta-dot" style="background:var(--w4)"></div><strong>Week 4</strong> Admin & Seller P2</div>
  <div class="meta-item"><div class="meta-dot" style="background:var(--w5)"></div><strong>Launch</strong> Final Days</div>
</div>

<div class="controls" id="controls">
  <button class="btn active" onclick="filterWeek('all',this)">All</button>
  <button class="btn" onclick="filterWeek(1,this)">Week 1</button>
  <button class="btn" onclick="filterWeek(2,this)">Week 2</button>
  <button class="btn" onclick="filterWeek(3,this)">Week 3</button>
  <button class="btn" onclick="filterWeek(4,this)">Week 4</button>
  <button class="btn" onclick="filterWeek(5,this)">Launch</button>
  <button class="btn" onclick="toggleDeps()" id="depBtn">Show Dependencies</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-bar" style="background:var(--w1)"></div>Week 1</div>
  <div class="legend-item"><div class="legend-bar" style="background:var(--w2)"></div>Week 2</div>
  <div class="legend-item"><div class="legend-bar" style="background:var(--w3)"></div>Week 3</div>
  <div class="legend-item"><div class="legend-bar" style="background:var(--w4)"></div>Week 4</div>
  <div class="legend-item"><div class="legend-bar" style="background:var(--w5)"></div>Launch</div>
  <div class="legend-item"><div class="legend-diamond"></div>Milestone</div>
</div>

<div class="stats-grid" id="statsBar"></div>

<div class="gantt-outer">
  <div class="gantt-scroll">
    <div class="gantt-grid" id="gantt">
      <!-- JS builds this -->
    </div>
  </div>
</div>

<div style="height:80px"></div>

<div class="footer-bar">
  <span class="fb-label">Overall Progress</span>
  <div class="fb-progress"><div class="fb-fill" id="progressFill"></div></div>
  <span class="fb-pct" id="progressPct">0%</span>
</div>

<div id="tooltip"></div>

<script>
const W = 72;
const LABEL_W = 260;
const ROW_H = 52;

const weeks = [
  { num:1, name:'Foundation & Public Marketing Pages', color:'#4f8cff', startDay:1, endDay:7 },
  { num:2, name:'Shop, Cart & Contact', color:'#a855f7', startDay:8, endDay:14 },
  { num:3, name:'Checkout + Seller Dashboard (Part 1)', color:'#22c55e', startDay:15, endDay:21 },
  { num:4, name:'Seller (Part 2) + Admin', color:'#f59e0b', startDay:22, endDay:28 },
  { num:5, name:'Launch Days', color:'#ef4444', startDay:29, endDay:32 }
];

const weekColors = {1:'var(--w1)',2:'var(--w2)',3:'var(--w3)',4:'var(--w4)',5:'var(--w5)'};
const weekRaw = {1:'#4f8cff',2:'#a855f7',3:'#22c55e',4:'#f59e0b',5:'#ef4444'};

const tasks = [
  {
    id:'d1',day:1,duration:1,week:1,
    name:'Core Setup',
    details:['Database + schema deployment','Secure user accounts (register, login, logout)','Header (responsive nav, role-aware, mobile drawer)','Footer (links, socials, newsletter placeholder)','Light/dark theme system','Toast notifications'],
    deps:[]
  },
  {
    id:'d2',day:2,duration:1,week:1,
    name:'Home Page',
    details:['Hero with main CTA','Top trending services grid → shop links','"Just Dropped" products (truncated + tooltip)','"How to edit a template" tutorial','Partners carousel','Bottom CTA strip'],
    deps:['d1']
  },
  {
    id:'d3',day:3,duration:1,week:1,
    name:'About Page',
    details:['Company info section','Stats with progress bars (Projects, Clients, Experience)','Team grid with photos, names, roles','"Read more" linking to CV pages'],
    deps:['d1']
  },
  {
    id:'d4',day:4,duration:1,week:1,
    name:'Team CV Pages',
    details:['Individual CV at /about/team/[slug]','Sections: bio, experience, skills, projects','Admin-managed team members'],
    deps:['d3']
  },
  {
    id:'d5',day:5,duration:1,week:1,
    name:'Services Page',
    details:['Numbered layout (01–10)','10 services from tracker','Each service arrow → shop redirect'],
    deps:['d1']
  },
  {
    id:'d6',day:6,duration:1,week:1,

    deps:['d1']
  },
  {
    id:'d7',day:7,duration:1,week:1,
    name:'Portfolio Detail + Brand Guidelines',

    deps:['d6']
  },
  {id:'m1',day:7,milestone:true,week:1,name:'🎯 Public marketing site live',details:['Preview link shared to client']},

  {
    id:'d8',day:8,duration:1,week:2,
    name:'Contact Page + Storage Setup',

  {

    deps:['d5']
  },
  {

    deps:['d9']
  },
  {
    id:'d11',day:11,duration:1,week:2,

  },
  {

  },
  {
    id:'d19',day:19,duration:1,week:3,

    deps:['d16','d17']

  {
    id:'d20',day:20,duration:1,week:3,
    name:'Seller: Customers + Reviews',

function getTask(id){ return tasks.find(t=>t.id===id); }

function buildGantt(){
  const grid = document.getElementById('gantt');

  // Day header row
  const dayHeader = document.createElement('div');
  dayHeader.className = 'day-header';
  dayHeader.style.height = '36px';

  const labelStub = document.createElement('div');
  labelStub.className = 'day-cell sticky-label';
  labelStub.textContent = 'Task';
  dayHeader.appendChild(labelStub);

  for(let d=1; d<=32; d++){
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (d===1 || d===8 || d===15 || d===22 || d===29 ? ' week-start' : '');
    cell.textContent = 'D'+d;
    dayHeader.appendChild(cell);
  }
  grid.appendChild(dayHeader);

  // Render weeks with their tasks
  let rowIdx = 0;
  weeks.forEach(week => {
    // Week band label
    const band = document.createElement('div');
    band.className = 'week-band';
    band.dataset.week = week.num;
    const bandLabel = document.createElement('div');
    bandLabel.className = 'band-label';
    bandLabel.innerHTML = `<span style="color:${weekRaw[week.num]}">WEEK ${week.num}</span> <span>— ${week.name}</span>`;
    bandLabel.style.borderLeft = `3px solid ${weekRaw[week.num]}`;
    bandLabel.style.paddingLeft = '17px';
    band.appendChild(bandLabel);
    grid.appendChild(band);

    // Tasks for this week
    const weekTasks = tasks.filter(t => t.week === week.num);
    weekTasks.forEach(task => {
      rowIdx++;
      const row = document.createElement('div');
      row.className = 'task-row' + (task.milestone ? ' milestone-row' : '');
      row.dataset.week = week.num;
      row.dataset.id = task.id;
      row.dataset.rowIdx = rowIdx;

      // Sticky label
      const label = document.createElement('div');
      label.className = 'task-label';
      if(task.milestone){
        label.innerHTML = `
          <div class="milestone-diamond"></div>
          <div class="task-name" style="color:var(--milestone);font-weight:700">${task.name}</div>
        `;
      } else {
        label.innerHTML = `
          <div class="task-num" style="background:${weekColors[task.week]}">${task.day}</div>
          <div class="task-name">${task.name}</div>
        `;
      }
      row.appendChild(label);

      // 32 bar cells
      for(let d=1; d<=32; d++){
        const cell = document.createElement('div');
        cell.className = 'bar-cell';
        row.appendChild(cell);
      }

      // Bar or milestone marker
      if(!task.milestone){
        const bar = document.createElement('div');
        bar.className = 'bar';
        // Position: day cell starts at column (task.day+1), with padding
        const left = LABEL_W + (task.day - 1) * W + 4;
        const width = task.duration * W - 8;
        bar.style.left = left + 'px';
        bar.style.width = width + 'px';
        bar.style.background = `linear-gradient(135deg, ${weekRaw[task.week]}, ${shadeColor(weekRaw[task.week], -25)})`;
        bar.dataset.id = task.id;
        bar.innerHTML = `<span class="bar-text">${task.name}</span>`;
        bar.addEventListener('mouseenter', e => {
          showTooltip(e, task);
          highlightDeps(task.id);
        });
        bar.addEventListener('mouseleave', () => {
          hideTooltip();
          clearDepHighlight();
        });
        row.appendChild(bar);
      } else {
        const marker = document.createElement('div');
        marker.className = 'milestone-marker';
        marker.dataset.id = task.id;
        const left = LABEL_W + (task.day - 1) * W + W/2;
        marker.style.left = left + 'px';
        marker.addEventListener('mouseenter', e => showTooltip(e, task));
        marker.addEventListener('mouseleave', hideTooltip);
        row.appendChild(marker);
      }

      grid.appendChild(row);
    });
  });

  setTimeout(drawDepArrows, 50);
}

function shadeColor(hex, amt){
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0,Math.min(255,r+amt));
  g = Math.max(0,Math.min(255,g+amt));
  b = Math.max(0,Math.min(255,b+amt));
  return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}

let showDeps = false;
function toggleDeps(){
  showDeps = !showDeps;
  const btn = document.getElementById('depBtn');
  btn.classList.toggle('active', showDeps);
  btn.textContent = showDeps ? 'Hide Dependencies' : 'Show Dependencies';
  if(showDeps) drawDepArrows();
  else document.querySelectorAll('.dep-svg').forEach(el=>el.remove());
}

function drawDepArrows(){
  document.querySelectorAll('.dep-svg').forEach(el=>el.remove());
  const grid = document.getElementById('gantt');
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('dep-svg');
  const gridRect = grid.getBoundingClientRect();
  svg.style.width = grid.offsetWidth + 'px';
  svg.style.height = grid.offsetHeight + 'px';

  tasks.forEach(task => {
    if(!task.deps || !task.deps.length) return;
    task.deps.forEach(depId => {
      const dep = getTask(depId);
      if(!dep) return;
      const fromRow = document.querySelector(`.task-row[data-id="${depId}"]`);
      const toRow = document.querySelector(`.task-row[data-id="${task.id}"]`);
      if(!fromRow || !toRow) return;

      const fromY = fromRow.offsetTop + fromRow.offsetHeight / 2;
      const toY = toRow.offsetTop + toRow.offsetHeight / 2;

      let fromX = LABEL_W + dep.day * W - 4; // right edge of dep bar
      let toX = LABEL_W + (task.day - 1) * W + 4; // left edge of task bar

      // For milestone dep
      if(dep.milestone) fromX = LABEL_W + (dep.day - 1) * W + W/2;
      // For milestone target
      if(task.milestone) toX = LABEL_W + (task.day - 1) * W + W/2;

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      const cp1x = fromX + 40;
      const cp2x = toX - 40;
      const d = `M ${fromX} ${fromY} C ${cp1x} ${fromY}, ${cp2x} ${toY}, ${toX} ${toY}`;
      path.setAttribute('d', d);
      path.setAttribute('fill','none');
      path.setAttribute('stroke', weekRaw[dep.week] || '#4f8cff');
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('stroke-dasharray','5 4');
      path.setAttribute('opacity','0.25');
      path.setAttribute('data-from', depId);
      path.setAttribute('data-to', task.id);
      svg.appendChild(path);
    });
  });

  grid.appendChild(svg);
}

function highlightDeps(taskId){
  const task = getTask(taskId);
  if(!task || !task.deps) return;
  task.deps.forEach(depId => {
    const bar = document.querySelector(`.bar[data-id="${depId}"]`);
    if(bar) bar.style.filter = 'brightness(1.25)';
  });
  document.querySelectorAll(`.dep-svg path[data-to="${taskId}"]`).forEach(p => {
    p.setAttribute('opacity','0.8');
    p.setAttribute('stroke-dasharray','none');
    p.setAttribute('stroke-width','2');
  });
}

function clearDepHighlight(){
  document.querySelectorAll('.bar').forEach(b => b.style.filter = '');
  document.querySelectorAll('.dep-svg path').forEach(p => {
    p.setAttribute('opacity','0.25');
    p.setAttribute('stroke-dasharray','5 4');
    p.setAttribute('stroke-width','1.5');
  });
}

const tooltip = document.getElementById('tooltip');
function showTooltip(e, task){
  const week = weeks.find(w=>w.num===task.week);
  let html = `<div class="tt-phase" style="color:${weekRaw[task.week]}">WEEK ${task.week} — ${week.name}</div>`;
  html += `<h3>${task.name}</h3>`;
  html += `<div class="tt-day">Day ${task.day}${task.duration>1 ? ' → '+(task.day+task.duration-1) : ''}</div>`;
  if(task.details && task.details.length){
    html += '<ul>';
    task.details.forEach(d => html += `<li>${d}</li>`);
    html += '</ul>';
  }
  if(task.deps && task.deps.length){
    html += `<div class="tt-deps">Depends on: ${task.deps.map(d=>{const t=getTask(d);return t?t.name:d}).join(', ')}</div>`;
  }
  tooltip.innerHTML = html;
  tooltip.classList.add('show');

  const rect = e.target.getBoundingClientRect();
  let left = rect.right + 14;
  let top = rect.top - 10;
  if(left + 400 > window.innerWidth) left = rect.left - 400;
  if(top + tooltip.offsetHeight > window.innerHeight) top = window.innerHeight - tooltip.offsetHeight - 20;
  if(top < 10) top = 10;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}
function hideTooltip(){
  tooltip.classList.remove('show');
}

function filterWeek(week, btn){
  document.querySelectorAll('.controls .btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.task-row').forEach(row => {
    row.style.display = (week === 'all' || parseInt(row.dataset.week) === week) ? '' : 'none';
  });
  document.querySelectorAll('.week-band').forEach(band => {
    band.style.display = (week === 'all' || parseInt(band.dataset.week) === week) ? '' : 'none';
  });
  setTimeout(()=>{ if(showDeps) drawDepArrows(); }, 50);
}

function buildStats(){
  const totalTasks = tasks.filter(t=>!t.milestone).length;
  const milestones = tasks.filter(t=>t.milestone).length;
  const totalDeps = tasks.reduce((a,t)=>a+(t.deps?t.deps.length:0),0);

  const stats = [
    {val:'32',label:'Total Days'},
    {val:'5',label:'Phases'},
    {val:totalTasks,label:'Deliverables'},
    {val:milestones,label:'Milestones'},
    {val:totalDeps,label:'Dependencies'},
    {val:'1',label:'Final Launch'}
  ];

  document.getElementById('statsBar').innerHTML = stats.map(s=>`
    <div class="stat-card">
      <div class="stat-val">${s.val}</div>
      <div class="stat-label">${s.label}</div>
    </div>
  `).join('');
}

function animateProgress(){
  const fill = document.getElementById('progressFill');
  const pct = document.getElementById('progressPct');
  fill.style.width = '0%';
  pct.textContent = '0%';
}

buildStats();
buildGantt();
setTimeout(animateProgress, 300);
window.addEventListener('resize', ()=>{ if(showDeps) drawDepArrows(); });
</script>
